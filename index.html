<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--night); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }

  .slide { position: absolute; inset: 0; background-size: cover; background-position: center top; opacity: 0; transition: opacity 1.2s ease; }
  .slide.active { opacity: 1; }
  .slide::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(13,17,23,0.2) 0%, rgba(13,17,23,0.7) 70%, rgba(13,17,23,0.95) 100%); }
  .hero-content { position: relative; z-index: 2; text-align: center; padding: 0 1.5rem; }
  .greeting-label { font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }

  .date-display { font-size: 0.8rem; color: var(--muted); margin: 0.3rem 0 1.2rem; letter-spacing: 0.1em; }
  .noey-name { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(3rem, 10vw, 5rem); color: var(--gold-light); text-shadow: 0 0 40px rgba(201,168,76,0.4); line-height: 1; margin-bottom: 0.4rem; }
  .tagline { font-size: 0.85rem; color: rgba(232,224,208,0.7); margin-bottom: 1.8rem; }

  .speak-btn:active { transform: scale(0.97); }

  @keyframes pulse { 0%,100% { box-shadow: 0 4px 20px rgba(212,91,138,0.4); } 50% { box-shadow: 0 4px 40px rgba(212,91,138,0.8); } }

  .scroll-hint { position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%); color: var(--muted); font-size: 0.65rem; letter-spacing: 0.2em; text-align: center; animation: bounce 2s infinite; z-index: 2; }
  @keyframes bounce { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(5px); } }
  .sections { max-width: 600px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  .section { margin-bottom: 1.5rem; }
  .section-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.7rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(201,168,76,0.2); }
  .section-title { font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); font-weight: 600; }
  .card { background: var(--card); border-radius: 10px; padding: 1rem 1.1rem; margin-bottom: 0.5rem; border: 1px solid rgba(255,255,255,0.05); }
  .card-title { font-size: 0.88rem; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 0.25rem; }
  .card-meta { font-size: 0.7rem; color: var(--muted); display: flex; gap: 0.5rem; align-items: center; }
  .card-source { background: rgba(201,168,76,0.15); color: var(--gold); border-radius: 4px; padding: 0.1rem 0.35rem; font-size: 0.62rem; font-weight: 600; }
  .weather-card { background: linear-gradient(135deg, #1a2540, #1e2d42); border-radius: 14px; padding: 1.2rem; border: 1px solid rgba(100,150,255,0.12); display: flex; align-items: center; gap: 1rem; }
  .weather-icon { font-size: 2.8rem; line-height: 1; flex-shrink: 0; }
  .weather-temp { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; }
  .weather-desc { font-size: 0.8rem; color: var(--muted); margin-top: 0.15rem; }

  .jacket-yes { background: rgba(212,91,138,0.2); color: var(--thai-pink); }
  .jacket-no { background: rgba(80,200,120,0.15); color: #7dd3a0; }
  .loading-pill { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 0.9rem; text-align: center; color: var(--muted); font-size: 0.78rem; display: flex; align-items: center; justify-content: center; gap: 0.4rem; }
  .spinner { width: 12px; height: 12px; border: 2px solid rgba(201,168,76,0.3); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }

  .refresh-btn { background: transparent; border: 1px solid rgba(201,168,76,0.3); color: var(--gold); border-radius: 8px; padding: 0.5rem 1.2rem; font-size: 0.78rem; cursor: pointer; display: block; margin: 0 auto; font-family: 'Inter', sans-serif; }

<script>
const GOOGLE_TTS_KEY = 'AIzaSyCqvxQdOdTMp6Y1DaMENmJTZQv8uunjwZc';

// Slideshow
let currentSlide = 0;
const slides = document.querySelectorAll('.slide');
setInterval(() => {
  slides[currentSlide].classList.remove('active');
  currentSlide = (currentSlide + 1) % slides.length;
  slides[currentSlide].classList.add('active');
}, 5000);

// Config
const MOVE_DATE = new Date('2026-06-25');
function getLocation() {
  return new Date() >= MOVE_DATE
    ? { name: 'Kreuzlingen', lat: 47.65, lon: 9.18 }
    : { name: 'Neckertal / St. Peterzell', lat: 47.37, lon: 9.21 };
}

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  document.getElementById('dateDisplay').textContent = days[now.getDay()] + ', ' + now.getDate() + '. ' + months[now.getMonth()] + ' ' + now.getFullYear();
}
updateClock();
setInterval(updateClock, 15000);

// Google TTS - natürliche Frauenstimme
let isSpeaking = false;
let currentAudio = null;
let speechQueue = [];

async function googleTTS(text) {
  const resp = await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${GOOGLE_TTS_KEY}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      input: { text: text },
      voice: {
        languageCode: 'de-DE',
        name: 'de-DE-Chirp3-HD-Leda',
        ssmlGender: 'FEMALE'
      },
      audioConfig: {
        audioEncoding: 'MP3',
        speakingRate: 0.95,
        pitch: 1.0
      }
    })
  });
  const data = await resp.json();
  if (!data.audioContent) throw new Error('TTS failed');
  return 'data:audio/mp3;base64,' + data.audioContent;
}

async function speakText(text) {
  try {
    document.getElementById('voiceStatus').textContent = '🎵 Spreche...';
    const audioData = await googleTTS(text);
    return new Promise((resolve) => {
      currentAudio = new Audio(audioData);
      currentAudio.onended = resolve;
      currentAudio.onerror = resolve;
      currentAudio.play();
    });
  } catch(e) {
    // Fallback auf Browser-TTS
    return new Promise((resolve) => {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'de-DE'; u.rate = 0.92; u.pitch = 1.1;
      u.onend = u.onerror = resolve;
      speechSynthesis.speak(u);
    });
  }
}

async function startBriefing() {
  if (isSpeaking) {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    if (window.speechSynthesis) speechSynthesis.cancel();
    isSpeaking = false;
    setBtnState(false);
    document.getElementById('voiceStatus').textContent = '';
    return;
  }
  isSpeaking = true;
  setBtnState(true);

  const h = new Date().getHours();
  const greet = h < 10 ? 'Guten Morgen' : h < 18 ? 'Hallo' : 'Guten Abend';
  const loc = getLocation();

  const texts = [
    greet + ', mein Schatz! Hier ist Noey, deine Superfrau aus Thailand. Ich wünsche dir einen wunderschönen Tag in ' + loc.name + '!'
  ];

  const wCard = document.querySelector('#weatherSection .weather-desc');
  const wTemp = document.querySelector('#weatherSection .weather-temp');
  const jBadge = document.querySelector('#weatherSection .jacket-badge');
  if (wCard && wTemp) {
    texts.push('Das Wetter heute: ' + wCard.textContent + ', ' + wTemp.textContent.replace('°','  Grad') + '. ' + (jBadge ? jBadge.textContent : ''));
  }

  [['worldNews','Weltgeschehen'],['swissNews','Schweiz'],['regionNews','Deine Region']].forEach(([id,label]) => {
    const cards = document.querySelectorAll('#'+id+' .card-title');
    if (cards.length) texts.push(label + ': ' + Array.from(cards).slice(0,2).map(c=>c.textContent).join('. '));
  });

  texts.push('Das war dein Briefing. Hab einen fantastischen Tag, mein Schatz!');

  for (const text of texts) {
    if (!isSpeaking) break;
    await speakText(text);
  }

  isSpeaking = false;
  setBtnState(false);
  document.getElementById('voiceStatus').textContent = '✓ Fertig';
}

function setBtnState(on) {
  const btn = document.getElementById('speakBtn');
  document.getElementById('speakIcon').textContent = on ? '⏹️' : '🎙️';
  document.getElementById('speakText').textContent = on ? 'Stoppen' : 'Briefing starten';
  on ? btn.classList.add('speaking') : btn.classList.remove('speaking');
}

// Wetter
async function loadWeather() {
  const loc = getLocation();
  document.getElementById('regionTitle').textContent = '📍 ' + loc.name;
  document.getElementById('eventsTitle').textContent = '🎉 Events in ' + loc.name;
  try {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,weathercode,windspeed_10m&daily=temperature_2m_max,temperature_2m_min&timezone=Europe%2FBerlin&forecast_days=1`);
    const d = await r.json();
    const temp = Math.round(d.current.temperature_2m);
    const max = Math.round(d.daily.temperature_2m_max[0]);
    const min = Math.round(d.daily.temperature_2m_min[0]);
    const wind = Math.round(d.current.windspeed_10m);
    const {icon, desc} = wCode(d.current.weathercode);
    const jacket = max < 16 || wind > 30;
    document.getElementById('weatherSection').innerHTML = `
      <div class="weather-card">
        <div class="weather-icon">${icon}</div>
        <div>
          <div class="weather-temp">${temp}°</div>
          <div class="weather-desc">${desc} · ${min}°–${max}° · ${wind} km/h</div>
          <span class="jacket-badge ${jacket?'jacket-yes':'jacket-no'}">${jacket?'🧥 Jacke empfohlen':'✓ Keine Jacke nötig'}</span>
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('weatherSection').innerHTML = '<div class="loading-pill">Wetter nicht verfügbar</div>';
  }
}

function wCode(c) {
  if (c===0) return {icon:'☀️',desc:'Sonnig'};
  if (c<=2) return {icon:'🌤️',desc:'Teilweise bewölkt'};
  if (c===3) return {icon:'☁️',desc:'Bedeckt'};
  if (c<=49) return {icon:'🌫️',desc:'Nebel'};
  if (c<=59) return {icon:'🌦️',desc:'Nieselregen'};
  if (c<=69) return {icon:'🌧️',desc:'Regen'};
  if (c<=79) return {icon:'❄️',desc:'Schnee'};
  if (c<=82) return {icon:'🌧️',desc:'Schauer'};
  if (c<=99) return {icon:'⛈️',desc:'Gewitter'};
  return {icon:'🌡️',desc:''};
}

// News via Claude API
async function fetchNews(topic, containerId) {
  const loc = getLocation();
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        tools: [{"type":"web_search_20250305","name":"web_search"}],
        system: 'Antworte NUR mit einem JSON-Array. Format: [{"title":"...","source":"...","time":"heute"}]. Keine Erklärungen, kein Markdown.',
        messages: [{role:'user', content: topic}]
      })
    });
    const data = await resp.json();
    let raw = '';
    for (const b of data.content||[]) { if (b.type==='text') raw += b.text; }
    raw = raw.replace(/```json|```/g,'').trim();
    const s = raw.indexOf('['), e = raw.lastIndexOf(']');
    if (s<0||e<0) throw new Error('no json');
    const items = JSON.parse(raw.substring(s,e+1));
    document.getElementById(containerId).innerHTML = items.slice(0,3).map(item =>
      `<div class="card">
        <div class="card-title">${item.title}</div>
        <div class="card-meta"><span class="card-source">${item.source}</span><span>${item.time||'Heute'}</span></div>
      </div>`
    ).join('');
  } catch(e) {
    document.getElementById(containerId).innerHTML = '<div class="loading-pill">Nicht verfügbar</div>';
  }
}

function loadAll() {
  ['worldNews','swissNews','regionNews','eventsSection'].forEach(id => {
    document.getElementById(id).innerHTML = '<div class="loading-pill"><span class="spinner"></span> Laden...</div>';
  });
  const loc = getLocation();
  loadWeather();
  fetchNews('Die 3 wichtigsten internationalen Nachrichten von heute', 'worldNews');
  fetchNews('Die 3 wichtigsten Schweizer Nachrichten von heute von SRF oder NZZ', 'swissNews');
  fetchNews('Aktuelle Nachrichten aus ' + loc.name + ' und Umgebung', 'regionNews');
  fetchNews('Events und Veranstaltungen in ' + loc.name + ' diese Woche', 'eventsSection');
}

window.addEventListener('load', loadAll);
</script>
